          - SKAdNetworkIdentifier: 4dzt52r2t5.skadnetwork
          - SKAdNetworkIdentifier: tl55sbb4fm.skadnetwork
          - SKAdNetworkIdentifier: c3frkrj4fj.skadnetwork
          - SKAdNetworkIdentifier: e5fvkxwrpn.skadnetwork
          - SKAdNetworkIdentifier: 8c4e2ghe7u.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 97r2b46745.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
    entitlements:
      path: MioCam/Resources/MioCam.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: production
    capabilities:
      com.apple.SignInWithApple:
        enabled: true
      com.apple.Push:
        enabled: true
      com.apple.BackgroundModes:
        enabled: true
        options:
          - audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.itoguchi.MioCam
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: 16.0
        DEVELOPMENT_TEAM: NUZ8XA844N
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: true
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        OTHER_SWIFT_FLAGS: "$(inherited)"
      configs:
        Debug:
          GADMOB_APP_ID: ca-app-pub-3940256099942544~1458002511
        Release:
          GADMOB_APP_ID: ca-app-pub-3113647340712066~4766646754
    dependencies:
      - package: Firebase
        products:
          - FirebaseAuth
          - FirebaseFirestore
          - FirebaseFunctions
          - FirebaseCrashlytics
          - FirebaseMessaging
      - package: WebRTC
        products:
          - WebRTC
      - package: GoogleMobileAds
        products:
          - GoogleMobileAds
      - package: GoogleUserMessagingPlatform
        products:
          - GoogleUserMessagingPlatform

  MioCamTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MioCamTests
    dependencies:
      - target: MioCam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.itoguchi.MioCamTests
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: 16.0

  MioCamWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - path: MioCamWatch
    resources:
      - path: MioCamWatch/Resources/Assets.xcassets
        type: assetCatalog
      - path: MioCamWatch/Resources/ja.lproj
        type: folder
      - path: MioCamWatch/Resources/en.lproj
        type: folder
      - path: MioCamWatch/Resources/es.lproj
        type: folder
      - path: MioCamWatch/Resources/pt-BR.lproj
        type: folder
      - path: MioCamWatch/Resources/ko.lproj
        type: folder
    info:
      path: MioCamWatch/Resources/Info.plist
      properties:
        CFBundleDisplayName: MioCam
        CFBundleIdentifier: com.itoguchi.MioCam.watchkitapp
        CFBundleName: $(PRODUCT_NAME)
        CFBundleVersion: "2"
        CFBundleShortVersionString: 2.0.0
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.itoguchi.MioCam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.itoguchi.MioCam.watchkitapp
        SWIFT_VERSION: 5.9
        WATCHOS_DEPLOYMENT_TARGET: 9.0
        DEVELOPMENT_TEAM: NUZ8XA844N
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Firebase
        products:
          - FirebaseAuth
          - FirebaseFirestore

schemes:
  MioCam:
    build:
      targets:
        MioCam: all
    test:
      targets:
        - MioCamTests
    run:
      config: Debug
    archive:
      config: Release
