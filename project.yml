name: MioCam
options:
  bundleIdPrefix: com.itoguchi
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
  developmentLanguage: ja
  xcodeVersion: "15.0"
  knownRegions: [ja, en, es, "pt-BR", ko]

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  WebRTC:
    url: https://github.com/stasel/WebRTC
    from: 125.0.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: 2.0.0

targets:
  MioCam:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MioCam
        excludes:
          - "**/*.md"
    resources:
      - path: MioCam/Resources/Assets.xcassets
        type: assetCatalog
      - path: MioCam/Resources/Info.plist
        type: plist
      - path: MioCam/Resources/GoogleService-Info.plist
        type: file
      - path: MioCam/Resources/connection_sound.caf
        type: file
      - path: MioCam/Resources/disconnection_sound.caf
        type: file
      - path: MioCam/Resources/ja.lproj
        type: folder
      - path: MioCam/Resources/en.lproj
        type: folder
      - path: MioCam/Resources/es.lproj
        type: folder
      - path: MioCam/Resources/pt-BR.lproj
        type: folder
      - path: MioCam/Resources/ko.lproj
        type: folder
    info:
      path: MioCam/Resources/Info.plist
      properties:
        CFBundleDisplayName: MioCam
        CFBundleIdentifier: com.itoguchi.MioCam
        CFBundleName: $(PRODUCT_NAME)
        CFBundleVersion: "2"
        CFBundleShortVersionString: 2.0.0
        UILaunchScreen: {}
        NSCameraUsageDescription: "MioCamは見守りカメラとして映像を配信するためにカメラへのアクセスが必要です。"
        NSMicrophoneUsageDescription: "MioCamは見守りカメラとして周囲の音声をモニターデバイスに配信するためにマイクへのアクセスが必要です。"
        NSLocalNetworkUsageDescription: "MioCamはカメラとモニター間のリアルタイム映像通信のためにローカルネットワークへのアクセスが必要です。"
        UIBackgroundModes:
          - audio
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        GADApplicationIdentifier: ca-app-pub-3113647340712066~4766646754
        NSUserTrackingUsageDescription: "Used to show you more relevant ads."
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: ludvb6z3bs.skadnetwork
          - SKAdNetworkIdentifier: cp8zw746q7.skadnetwork
          - SKAdNetworkIdentifier: 3sh42y64q3.skadnetwork
          - SKAdNetworkIdentifier: c6k4g5qg8m.skadnetwork
          - SKAdNetworkIdentifier: s39g8k73mm.skadnetwork
          - SKAdNetworkIdentifier: wg4vff78zm.skadnetwork
          - SKAdNetworkIdentifier: 3qy4746246.skadnetwork
          - SKAdNetworkIdentifier: f38h382jlk.skadnetwork
          - SKAdNetworkIdentifier: hs6bdukanm.skadnetwork
          - SKAdNetworkIdentifier: mlmmfzh3r3.skadnetwork
          - SKAdNetworkIdentifier: v4nxqhlyqp.skadnetwork
          - SKAdNetworkIdentifier: wzmmz9fp6w.skadnetwork
          - SKAdNetworkIdentifier: su67r6k2v3.skadnetwork
          - SKAdNetworkIdentifier: yclnxrl5pm.skadnetwork
          - SKAdNetworkIdentifier: t38b2kh725.skadnetwork
          - SKAdNetworkIdentifier: 7ug5zh24hu.skadnetwork
          - SKAdNetworkIdentifier: gta9lk7p23.skadnetwork
          - SKAdNetworkIdentifier: vutu7akeur.skadnetwork
          - SKAdNetworkIdentifier: y5ghdn5j9k.skadnetwork
          - SKAdNetworkIdentifier: v9wttpbfk9.skadnetwork
          - SKAdNetworkIdentifier: n38lu8286q.skadnetwork
          - SKAdNetworkIdentifier: 47vhws6wlr.skadnetwork
          - SKAdNetworkIdentifier: kbd757ywx3.skadnetwork
          - SKAdNetworkIdentifier: 9t245vhmpl.skadnetwork
          - SKAdNetworkIdentifier: a2p9lx4jpn.skadnetwork
          - SKAdNetworkIdentifier: 22mmun2rn5.skadnetwork
          - SKAdNetworkIdentifier: 44jx6755aq.skadnetwork
          - SKAdNetworkIdentifier: k674qkevps.skadnetwork
          - SKAdNetworkIdentifier: 4468km3ulz.skadnetwork
          - SKAdNetworkIdentifier: 2u9pt9hc89.skadnetwork
          - SKAdNetworkIdentifier: 8s468mfl3y.skadnetwork
          - SKAdNetworkIdentifier: klf5c3l5u5.skadnetwork
          - SKAdNetworkIdentifier: ppxm28t8ap.skadnetwork
          - SKAdNetworkIdentifier: kbmxgpxpgc.skadnetwork
          - SKAdNetworkIdentifier: uw77j35x4d.skadnetwork
